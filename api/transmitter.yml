openapi: 3.0.3
info:
  title: Внешние обработки (transmitter)
  description: |
    Распределение внешних обработок по информационным базам
  contact:
    email: a.strizhachuk@yandex.ru
  version: 2.1.0
servers:
  - url: http://transmitter/api/hs
    description: develop
tags:
  - name: default
  - name: gitlab
  - name: custom
paths:
  /version:
    get:
      summary: Версия конфигурации
      operationId: version
      responses:
        "200":
          description: Текущая версия
          content:
            application/json:
              schema:
                type: object
                properties:
                  version:
                    type: string
                    example: 1.0.0
  /gitlab/status:
    get:
      tags:
        - gitlab
      summary: Статус функциональности обработки запросов GitLab
      description: |
        Показывает текущий статус функциональности обработки запросов
        от внешних хранилищ (репозиториев) на сервере GitLab
      operationId: gitlab_status
      responses:
        "200":
          description: Текущий статус
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/message"
              examples:
                enabled:
                  summary: Включено
                  value:
                    message: обработка запросов включена
                disabled:
                  summary: Отключено
                  value:
                    message: обработка запросов отключена
  /gitlab/events/push:
    post:
      tags:
        - gitlab
      summary: Событие "push events"
      description: |
        Обработка запроса GitLab с событием "push events"
      operationId: gitlabPush
      parameters:
        - name: X-Gitlab-Event
          in: header
          description: X-Gitlab-Event
          required: true
          schema:
            type: string
            enum:
              - Push Hook
      responses:
        "200":
          description: Успех
          content: {}
        "400":
          description: Ошибочный запрос
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/message"
        "401":
          description: Аутентификация не пройдена
          content: {}
        "404":
          description: Обработчик события не найден
          content: {}
        "423":
          description: Функционал отключен
          content: {}
        "500":
          description: Ошибка сервера
          content:
            text/plain:
              schema:
                type: string
              examples:
                runtime error:
                  summary: Ошибка выполнения
                  value: |
                    {CommonModule.HTTPConnector.Module(764)}: Ошибка при
                    вызове метода контекста (ReadJSON)
      security:
        - api_key: []
  /custom/status:
    get:
      tags:
        - custom
      summary: Статус функциональности обработки произвольных запросов
      description: |
        Показывает текущий статус функциональности обработки произвольных запросов
      operationId: custom_status
      responses:
        "200":
          description: Текущий статус
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/message"
              examples:
                enabled:
                  summary: Включено
                  value:
                    message: обработка запросов включена
                disabled:
                  summary: Отключено
                  value:
                    message: обработка запросов отключена
components:
  schemas:
    message:
      type: object
      properties:
        message:
          type: string
  securitySchemes:
    api_key:
      type: apiKey
      name: X-Gitlab-Token
      in: header
